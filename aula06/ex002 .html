<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu primeiro programa</title>
    <style>
        body {
            background-color: rgb(94, 94, 175);
            color: white;
            font: normal 20pt Arial;
        }
        h1 {
            color: yellow;
        }
    </style>
</head>
<body>
    <h1>Olá mundo!</h1>
    <p>Me livrei da maldição</p>

    <script>
       var nome = window.prompt('Qual é o seu nome?')// vai perguntar o nome (para guardas os dados digitados inserir var nome = )
       window.alert('É um grande prazer em te conhecer, ' + nome + '!') // sinal de + significa concatenação (o nome tem que ficar fora das aspas e o sinal de + junta tudo. Se colocar o nome dentro de aspas, vai aparecer a palavra nome dentro do prompt). 
       //para colocar ! ou outros simbolos, colocar + e digitar dentro de ' ! '
    </script>
</body>
</html>
